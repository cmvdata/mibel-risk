name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install project
        run: uv sync --extra dev

      - name: Lint
        run: uv run ruff check src tests

      - name: Type check
        run: uv run mypy
        continue-on-error: true  # non-strict to start; tighten later

      - name: Test
        run: uv run pytest -m "not slow"
